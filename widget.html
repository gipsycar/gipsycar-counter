<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
}

.counter-box{
    background:#fff8ec;
    border:2px solid #ffb347;
    border-radius:16px;
    padding:18px;
    text-align:center;
    max-width:700px;
    margin:auto;
}

.number{
    color:#ff7a00;
    font-size:40px;
    font-weight:bold;
}

.text{
    font-size:20px;
    line-height:1.5;
}
</style>
</head>
<body>

<div class="counter-box">
    <div class="number" id="count">...</div>

    <div class="text">
        autóillatosítóval támogattátok az iskolakezdési csomagokat ❤️
    </div>
</div>

<script>
async function loadCounter() {

    const response = await fetch(
        "https://gipsycar-counter.onrender.com/stats"
    );

    const data = await response.json();

    document.getElementById("count").innerText =
        data.total;
}

loadCounter();

setInterval(loadCounter,60000);
</script>

</body>
</html>
