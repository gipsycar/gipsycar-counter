<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>GipsyCar Popup Teszt</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: #f5f5f5;
    }

    .gipsy-popup {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 320px;
      background: #111;
      color: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      display: none;
      z-index: 999999;
    }

    .gipsy-popup.show {
      display: block;
    }

    .gipsy-popup-title {
      font-size: 15px;
      margin-bottom: 8px;
      color: #ffb347;
      font-weight: bold;
    }

    .gipsy-popup-main {
      font-size: 17px;
      line-height: 1.4;
    }

    .gipsy-popup-main strong {
      color: #ffb347;
    }

    .gipsy-popup-small {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <h1>GipsyCar popup teszt</h1>
  <p>Ha minden jó, jobb alul megjelenik az utolsó támogatás.</p>

  <div id="gipsyPopup" class="gipsy-popup">
    <div class="gipsy-popup-title">🎒 Iskolakezdési támogatás</div>
    <div class="gipsy-popup-main" id="popupText"></div>
    <div class="gipsy-popup-small">GipsyCar.hu támogatási számláló</div>
  </div>

  <script>
    async function loadLastEvent() {
      try {
        const response = await fetch("http://localhost:3000/events");
        const events = await response.json();

        if (!events || events.length === 0) return;

        const last = events[0];

        document.getElementById("popupText").innerHTML =
          `Valaki most <strong>${last.qty} db autóillatosítót</strong> vásárolt.<br>
           Ez <strong>+${Number(last.donation).toLocaleString("hu-HU")} Ft</strong> támogatás.`;

        const popup = document.getElementById("gipsyPopup");
        popup.classList.add("show");

        setTimeout(() => {
          popup.classList.remove("show");
        }, 7000);

      } catch (error) {
        console.log("Popup hiba:", error);
      }
    }

    loadLastEvent();

    setInterval(loadLastEvent, 15000);
  </script>

</body>
</html>
