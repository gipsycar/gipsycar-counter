<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
}

.gipsy-counter{
    background:linear-gradient(135deg,#050505,#181818);
    border:2px solid #d89a2b;
    border-radius:20px;
    padding:22px 18px;
    color:white;
    text-align:center;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.title{
    color:#f3b24a;
    font-size:28px;
    font-weight:900;
    letter-spacing:3px;
    margin-bottom:18px;
}

.message{
    font-size:20px;
    line-height:1.45;
    margin-bottom:20px;
}

.message strong{
    color:#ff7a00;
}

.cards{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.card{
    flex:1;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.15);
    border-radius:16px;
    padding:18px;
}

.label{
    color:#f3b24a;
    font-size:15px;
    font-weight:800;
    margin-bottom:10px;
}

.value{
    color:#ff7a00;
    font-size:44px;
    font-weight:900;
    text-shadow:0 0 15px rgba(255,122,0,.4);
    animation:pulse 2.5s infinite;
}

.bottom{
    color:#f3b24a;
    font-size:18px;
    font-weight:800;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.05);
    }
}

@media(max-width:700px){

    .gipsy-counter{
        padding:16px 12px;
    }

    .title{
        font-size:20px;
        margin-bottom:12px;
    }

    .message{
        font-size:17px;
        margin-bottom:15px;
    }

    .cards{
        flex-direction:column;
        gap:10px;
        margin-bottom:15px;
    }

    .card{
        padding:14px;
    }

    .label{
        font-size:13px;
    }

    .value{
        font-size:32px;
    }

    .bottom{
        font-size:15px;
    }

}

</style>
</head>

<body>

<div class="gipsy-counter">

    <div class="title">
        ❤️ GIPSY CAR ❤️
    </div>

    <div class="message">
        Minden eladott <strong>autóillatosító</strong>
        árából <strong>500 Ft-ot</strong>
        rászoruló gyermekek tanszereire fordítunk.
    </div>

    <div class="cards">

        <div class="card">
            <div class="label">
                💰 EDDIG ÖSSZEGYŰLT
            </div>

            <div class="value">
                <span id="donation">...</span> Ft
            </div>
        </div>

        <div class="card">

            <div class="label">
                🚗 AUTÓILLATOSÍTÓ ELADVA
            </div>

            <div class="value">
                <span id="count">...</span> db
            </div>

        </div>

    </div>

    <div class="bottom">
        ❤️ Köszönjük, hogy együtt segíthetünk! ❤️
    </div>

</div>


<script>

async function loadCounter(){

    const response =
        await fetch("https://gipsycar-counter.onrender.com/stats");

    const data = await response.json();

    const total = Number(data.total || 0);

    document.getElementById("count").innerText = total;

    document.getElementById("donation").innerText =
        (total * 500).toLocaleString("hu-HU");

}

loadCounter();

setInterval(loadCounter,60000);

</script>

</body>
</html>
