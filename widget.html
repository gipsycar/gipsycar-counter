<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
}

.counter-box{
    background:#fff8ec;
    border:2px solid #ffb347;
    border-radius:16px;
    padding:18px;
    text-align:center;
    max-width:700px;
    margin:auto;
}

.number{
    color:#ff7a00;
    font-size:48px;
    font-weight:bold;
    margin-bottom:10px;
}

.text{
    font-size:20px;
    line-height:1.6;
}

.money{
    margin-top:10px;
    font-size:28px;
    font-weight:bold;
    color:#ff7a00;
}
</style>
</head>
<body>

<div class="counter-box">

    <div class="number">
        <span id="count">...</span> db
    </div>

    <div class="text">
        Eddig összegyűlt<br>
        <strong><span id="count2">...</span> db illatosító által</strong>
    </div>

    <div class="money">
        <span id="donation">...</span> Ft ❤️
    </div>

</div>

<script>
async function loadCounter() {

    const response = await fetch(
        "https://gipsycar-counter.onrender.com/stats"
    );

    const data = await response.json();

    document.getElementById("count").innerText = data.total;
    document.getElementById("count2").innerText = data.total;

    document.getElementById("donation").innerText =
        (data.total * 500).toLocaleString("hu-HU");
}

loadCounter();

setInterval(loadCounter,60000);
</script>

</body>
</html>
