<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
}

.gipsy-counter{
    position:relative;
    overflow:hidden;
    max-width:1100px;
    margin:0 auto;
    background:linear-gradient(135deg,#050505,#181818);
    color:#fff;
    border:2px solid #d89a2b;
    border-radius:18px;
    padding:22px;
    box-sizing:border-box;
    text-align:center;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
}

.glow{
    position:absolute;
    width:250px;
    height:250px;
    border-radius:50%;
    filter:blur(90px);
    opacity:.18;
}

.glow1{
    background:#ff7a00;
    top:-100px;
    left:-100px;
}

.glow2{
    background:#f3b24a;
    right:-80px;
    bottom:-80px;
}

.gc-title{
    position:relative;
    color:#f3b24a;
    font-size:26px;
    font-weight:900;
    letter-spacing:3px;
    margin-bottom:14px;
}

.gc-message{
    position:relative;
    font-size:23px;
    line-height:1.35;
    font-style:italic;
    max-width:760px;
    margin:0 auto 18px;
}

.gc-message strong{
    color:#ff7a00;
}

.gc-stats{
    position:relative;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
}

.gc-card{
    background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.18);
    border-radius:14px;
    padding:16px;
}

.gc-label{
    color:#f3b24a;
    font-size:15px;
    font-weight:800;
    letter-spacing:1px;
    margin-bottom:6px;
}

.gc-value{
    color:#ff7a00;
    font-size:42px;
    font-weight:900;
    text-shadow:0 0 12px rgba(255,122,0,.45);
    animation:pulse 2.3s infinite ease-in-out;
}

.gc-small{
    font-size:15px;
    font-weight:700;
}

.gc-thanks{
    position:relative;
    margin-top:16px;
    font-size:18px;
    font-weight:800;
    color:#f3b24a;
    animation:heartMove 3s infinite ease-in-out;
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.04);}
}

@keyframes heartMove{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-5px);}
}

@media(max-width:700px){
    .gipsy-counter{
        border-radius:14px;
        padding:14px 12px;
    }

    .gc-title{
        font-size:20px;
        margin-bottom:10px;
    }

    .gc-message{
        font-size:17px;
        line-height:1.32;
        margin-bottom:12px;
    }

    .gc-stats{
        grid-template-columns:1fr;
        gap:10px;
    }

    .gc-card{
        padding:11px;
    }

    .gc-label{
        font-size:13px;
    }

    .gc-value{
        font-size:32px;
    }

    .gc-small{
        font-size:13px;
    }

    .gc-thanks{
        font-size:15px;
        margin-top:12px;
    }
}
</style>
</head>
<body>

<div class="gipsy-counter">
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <div class="gc-title">GIPSY CAR ❤️</div>

    <div class="gc-message">
        Minden eladott <strong>autóillatosító</strong> árából
        <strong>500 Ft-ot</strong> rászoruló gyermekek tanszereire fordítunk.
    </div>

    <div class="gc-stats">
        <div class="gc-card">
            <div class="gc-label">💰 EDDIG ÖSSZEGYŰLT</div>
            <div class="gc-value"><span id="donation">...</span> Ft</div>
        </div>

        <div class="gc-card">
            <div class="gc-label">🚗 AUTÓILLATOSÍTÓ ELADVA</div>
            <div class="gc-value"><span id="count">...</span> db</div>
        </div>
    </div>

    <div class="gc-thanks">
        ❤️ Köszönjük, hogy együtt segíthetünk! ❤️
    </div>
</div>

<script>
async function loadCounter() {
    const response = await fetch("https://gipsycar-counter.onrender.com/stats");
    const data = await response.json();

    const total = Number(data.total || 0);
    const donation = total * 500;

    document.getElementById("count").innerText = total;
    document.getElementById("donation").innerText =
        donation.toLocaleString("hu-HU");
}

loadCounter();
setInterval(loadCounter, 60000);
</script>

</body>
</html>
