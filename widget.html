<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap');

body{
    margin:0;
    font-family:'Montserrat', Arial, sans-serif;
}

.gc-wrap{
    max-width:980px;
    margin:0 auto;
    padding:0;
}

.gc-banner{
    position:relative;
    overflow:hidden;
    background:
        radial-gradient(circle at 20% 0%, rgba(201,160,74,.18), transparent 30%),
        linear-gradient(135deg,#080808,#151515);
    border:2px solid #c9a04a;
    border-radius:18px;
    color:#fff;
    text-align:center;
    padding:22px 18px;
    box-shadow:0 10px 24px rgba(0,0,0,.25);
}

.gc-banner:before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,.08), transparent);
    transform:translateX(-120%);
    animation:shine 5s infinite;
}

.gc-inner{
    position:relative;
    z-index:2;
}

.gc-title{
    color:#c9a04a;
    font-size:22px;
    font-weight:900;
    letter-spacing:3px;
    margin-bottom:10px;
}

.gc-sub{
    font-size:16px;
    line-height:1.45;
    font-weight:500;
    max-width:720px;
    margin:0 auto 14px;
}

.gc-sub strong{
    color:#c9a04a;
    font-weight:900;
}

.gc-main{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    margin:14px 0;
}

.gc-money{
    font-size:42px;
    line-height:1;
    font-weight:900;
    color:#c9a04a;
    text-shadow:0 0 10px rgba(201,160,74,.25);
    animation:pulse 2.6s infinite;
}

.gc-label{
    font-size:13px;
    color:#ddd;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:1px;
}

.gc-separator{
    width:1px;
    height:58px;
    background:rgba(201,160,74,.45);
}

.gc-count{
    font-size:22px;
    font-weight:900;
    color:#fff;
}

.gc-count strong{
    color:#c9a04a;
    font-size:30px;
}

.gc-bottom{
    margin-top:12px;
    color:#c9a04a;
    font-size:14px;
    font-weight:800;
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.035);}
}

@keyframes shine{
    0%{transform:translateX(-120%);}
    45%,100%{transform:translateX(120%);}
}

@media(max-width:700px){
    .gc-banner{
        border-radius:14px;
        padding:18px 14px;
    }

    .gc-title{
        font-size:18px;
        letter-spacing:2px;
    }

    .gc-sub{
        font-size:14px;
        line-height:1.4;
        margin-bottom:12px;
    }

    .gc-main{
        flex-direction:column;
        gap:8px;
        margin:10px 0;
    }

    .gc-separator{
        width:70%;
        height:1px;
    }

    .gc-money{
        font-size:34px;
    }

    .gc-count{
        font-size:17px;
    }

    .gc-count strong{
        font-size:26px;
    }

    .gc-bottom{
        font-size:13px;
    }
}
</style>
</head>

<body>

<div class="gc-wrap">
    <div class="gc-banner">
        <div class="gc-inner">

            <div class="gc-title">ISKOLAKEZDÉSI TÁMOGATÁS ❤️</div>

            <div class="gc-sub">
                Minden eladott <strong>autóillatosító</strong> árából
                <strong>500 Ft-ot</strong> rászoruló gyermekek tanszereire fordítunk.
            </div>

            <div class="gc-main">
                <div>
                    <div class="gc-label">Eddig összegyűlt</div>
                    <div class="gc-money"><span id="donation">...</span> Ft</div>
                </div>

                <div class="gc-separator"></div>

                <div class="gc-count">
                    <strong><span id="count">...</span> db</strong><br>
                    autóillatosító eladva
                </div>
            </div>

            <div class="gc-bottom">
                Tesók vagyunk. Segítünk. Együtt. ❤️
            </div>

        </div>
    </div>
</div>

<script>
async function loadCounter(){
    const response = await fetch("https://gipsycar-counter.onrender.com/stats");
    const data = await response.json();

    const total = Number(data.total || 0);
    const donation = total * 500;

    document.getElementById("count").innerText = total;
    document.getElementById("donation").innerText =
        donation.toLocaleString("hu-HU");
}

loadCounter();
setInterval(loadCounter,60000);
</script>

</body>
</html>
